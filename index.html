<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP Livre</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0e12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        
        /* Estilo da tela de carregamento */
        .loader-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #7f00ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #8a8f9d;
            font-weight: bold;
        }

        /* Estilo da tela de erro (escondida por padrão) */
        .error-block {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .error-icon {
            font-size: 4rem;
            color: #ff4d4d;
            margin-bottom: 15px;
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .error-desc {
            color: #8a8f9d;
            font-size: 1.1rem;
            max-width: 400px;
            line-height: 1.5;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Bloco de Carregamento Inicial -->
        <div id="loader" class="loader-block">
            <div class="spinner"></div>
            <div class="loader-text">CARREGANDO...</div>
        </div>

        <!-- Bloco de Erro Oculto -->
        <div id="error-screen" class="error-block">
            <div class="error-icon">❌</div>
            <div class="error-title">O SITE ESTÁ COM PROBLEMAS</div>
            <div class="error-desc">Não foi possível carregar o menu do jogo. Por favor, tente recarregar a página ou verifique os arquivos.</div>
        </div>
    </div>

    <script>
        // Define o tempo limite para o erro disparar (4000 milissegundos = 4 segundos)
        const tempoLimite = 4000;

        // Inicia o cronômetro de falha
        const falhaTimeout = setTimeout(function() {
            // Esconde o carregamento e exibe a mensagem de erro estruturada
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-screen').style.display = 'block';
        }, tempoLimite);

        // Tenta realizar o redirecionamento para o arquivo correto dentro da pasta
        try {
            window.location.href = "menu de emtrada/menu-de-emtrada.html";
        } catch (err) {
            // Se o próprio navegador bloquear ou der erro imediato no script, dispara o erro antes do tempo
            clearTimeout(falhaTimeout);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-screen').style.display = 'block';
        }
    </script>
</body>
</html>
